name: heteroscedastic_regression
data:
  distribution: heteroscedastic
  type: function
  x_range: [0.01, 10]
  y_range: [-1.8, 1.8]
model:
  type: supervised
  layers: 5
  wires: 5
  ae_type: LL 
training:
  trainer: regression
  learning_rate: 0.01
  batch_size: 64
  epochs: 50
  training_samples: 1000
